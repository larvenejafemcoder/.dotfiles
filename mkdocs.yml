site_name: Dotfiles & Dev Tools Setup
site_description: Cross-distro dotfiles manager and interactive dev-environment bootstrap
site_author: Your Name
repo_url: https://github.com/your-org/dotfiles
docs_dir: docs
site_dir: site

theme:
  name: material
  palette:
    - scheme: slate
      primary: indigo
      accent: cyan
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode
    - scheme: default
      primary: indigo
      accent: cyan
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - search.highlight
    - content.code.copy

plugins:
  - search

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - toc:
      permalink: true
  - attr_list

nav:
  - Home: README.md
  - Installation: INSTALLATION.md
  - Architecture: ARCHITECTURE.md
  - Commands: COMMANDS.md
  - Configuration: CONFIGURATION.md
  - Examples: EXAMPLES.md
  - Development: DEVELOPMENT.md
  - Troubleshooting: TROUBLESHOOTING.md
  - API Reference: API.md
  - Security: SECURITY.md
  - FAQ: FAQ.md
  - Glossary: GLOSSARY.md
